services:
  postgres:
    image: postgres:16
    container_name: edm-etl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dw_edm
      POSTGRES_USER: edm_user
      POSTGRES_PASSWORD: edm_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run all SQL files in this folder on first initialization.
      - ./:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edm_user -d dw_edm"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: edm-etl-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8082:8080"

volumes:
  postgres_data:
